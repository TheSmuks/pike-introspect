name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pike
        run: |
          sudo apt-get update && sudo apt-get install -y pike8.0

      - name: Install PMP
        run: |
          git clone https://github.com/TheSmuks/pmp.git ~/.pmp
          cd ~/.pmp && git checkout v0.4.0
          echo "$HOME/.pmp/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          ~/.pmp/bin/pmp install

      - name: Run tests
        run: |
          pike -M src -M modules tests/run_tests.pike tests/pike
