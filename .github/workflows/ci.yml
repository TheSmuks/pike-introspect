name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pike
        run: |
          curl -LsSf https://pike.lysator.liu.se/pub/pike/latest-stable/install | sh
          echo "$HOME/.local/share/pike/bin" >> $GITHUB_PATH

      - name: Install PMP
        run: |
          curl -LsSf https://github.com/TheSmuks/pmp/install.sh | sh
          echo "$HOME/.pmp/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          pmp install

      - name: Run tests
        run: |
          pike -M src -M modules tests/run_tests.pike tests/pike
