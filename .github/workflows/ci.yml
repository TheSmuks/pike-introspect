name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Pike
        run: |
          sudo apt-get update && sudo apt-get install -y pike8.0

      - name: Install PMP
        run: |
          curl -LsSf https://raw.githubusercontent.com/TheSmuks/pmp/main/install.sh | sh
          echo "$HOME/.pmp/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          pmp install

      - name: Run tests
        run: |
          pike -M src -M modules tests/run_tests.pike tests/pike
