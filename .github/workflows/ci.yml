name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Pike
        run: |
          sudo apt-get update && sudo apt-get install -y pike8.0

      - name: Clone PUnit test framework
        run: |
          git clone --depth 1 --branch v1.0.0 https://github.com/TheSmuks/punit-tests.git /tmp/punit-tests

      - name: Run tests
        run: |
          pike -M src -M /tmp/punit-tests tests/run_tests.pike tests/pike
